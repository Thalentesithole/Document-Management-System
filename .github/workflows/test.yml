name: Test Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dms_test
        ports:
          - 5432:5432
          
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        cd backend
        pip install -r ../requirements.txt
        
    - name: Run Pytest
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/dms_test
      run: |
        cd backend
        pytest tests/ --cov=app --cov-report=xml
        
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Frontend Checks
      run: |
        cd frontend
        npm install
        npx tsc --noEmit
